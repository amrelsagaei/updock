site_name: updock
site_description: Run any Docker app from one word.
site_author: Amr Elsagaei
site_url: https://amrelsagaei.github.io/updock/

repo_name: amrelsagaei/updock
repo_url: https://github.com/amrelsagaei/updock
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: README.md
  - Getting started:
      - Installation: installation.md
      - Quick start: quickstart.md
  - Guide:
      - Usage: usage.md
      - Commands: commands.md
      - Configuration: configuration.md
      - Recipes: recipes.md
      - Projects and file layout: projects.md
  - Reference:
      - Security model: security.md
      - Troubleshooting: troubleshooting.md
      - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amrelsagaei/updock
