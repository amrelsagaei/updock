site_name: updock
site_description: Run any Docker app from one word.
site_author: Amr Elsagaei
site_url: https://amrelsagaei.github.io/updock/

repo_name: amrelsagaei/updock
repo_url: https://github.com/amrelsagaei/updock
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer # previous/next links at the bottom of every page
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: README.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Usage: usage.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Recipes: recipes.md
  - Projects and file layout: projects.md
  - Security model: security.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amrelsagaei/updock
