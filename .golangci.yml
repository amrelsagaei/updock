version: "2"

linters:
  default: standard
  enable:
    # correctness
    - bodyclose
    - nilerr
    - exhaustive

    # style
    - revive
    - misspell

    # hygiene
    - nolintlint
    - gocritic
    - prealloc

  settings:
    nolintlint:
      require-explanation: true
      require-specific: true

    exhaustive:
      default-signifies-exhaustive: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gofumpt:
      extra-rules: true
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/amrelsagaei/updock)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
